---
# Code Owner: Sean Kurtz
#
# Hardens the security of a Fedora 43 server provisidoned
# via Hetzner, but this same basic schema should work for all cloud
# providers. These are all just general best practices for security
# on a modern Linux distro.
#
- name: Infrastructure security hardening
  hosts: ash-1
  gather_facts: true
  become: true
  port: "{{ ash_1_ssh_port }}"

  tasks:
    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"

    - name: Disable password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Ensure pubkey authentication is enabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PubkeyAuthentication"
        line: "PubkeyAuthentication yes"

    - name: Restrict SSH access to admin user only
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?AllowUsers"
        line: "AllowUsers {{ ash_1_user }}"

    - name: Restart sshd to apply hardening
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: Ensure firewalld is installed
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Ensure firewalld is started
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Remove SSH from the public zone
      ansible.posix.firewalld:
        zone: public
        service: ssh
        state: disabled
        permanent: true
        immediate: true

    - name: Assign tailscale0 to the trusted zone
      ansible.posix.firewalld:
        zone: trusted
        interface: tailscale0
        state: enabled
        permanent: true
        immediate: true
