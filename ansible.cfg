# Code Owner: Sean Kurtz
#
# Ansible configuration for the ash-1 server project. Disables host
# key checking prompts, retry files, and cowsay. Vault password is
# read from .vault-pass which is excluded from version control.
#
[defaults]
inventory = inventory.yml
host_key_checking = True
retry_files_enabled = False
vault_password_file = .vault-pass
nocows = True

